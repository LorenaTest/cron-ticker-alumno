name: CI Pipeline Completo

on:                       # eventos que dispara el workflow
  push:                   # cuando se hace push a la rama main de github
    branches: [ main ]    # ...a la rama main
  
  pull_request:           # cuando alguien hace pull request(pr) a la rama main
    branches: [ main ]    # ...a la rama main

  workflow_dispatch:      # permite ejecutar el workflow manualmente desde la pestaña Actions o UI

# Variables a nivel del workflow
env: 
  NODE_VERSION: "20"

jobs:                     

  # ========== JOB 1: LINT ==========
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses : actions/checkout@v4
      - uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci
      - run: npm run lint

  # ========== JOB 2: TEST ==========
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses : actions/checkout@v4
      - uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci
      - name: Run tests with coverage
        run: npm run test:coverage

  # ========== JOB 3: BUILD ==========
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci
      - run: npm run build  