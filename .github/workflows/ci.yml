name: CI Pipeline         # nombre visible en la pestana de Actions

on:                       # eventos que dispara el workflow
  push:                   # cuando se hace push a la rama main de github
    branches: [ main ]    # ...a la rama main
  
  pull_request:           # cuando alguien hace pull request(pr) a la rama main
    branches: [ main ]    # ...a la rama main

  workflow_dispatch:      # permite ejecutar el workflow manualmente desde la pestaña Actions o UI

# Variables a nivel del workflow
env: 
  NODE_VERSION: "20"
  APP_NAME: cron-ticker

jobs:                     # define los jobs que se ejecutaran en el workflow
  
  build:
    runs-on: ubuntu-latest

    # Variables a nivel del job
    env:
      BUILD_DIR: dist

    steps:
      - uses: actions/checkout@v3

      - name: Show Variables
        run: |
          echo "App: ${{ env.APP_NAME }}, Node: ${{ env.NODE_VERSION }}"

      - name: Show Github Variables
        run: |
          echo "App Version: ${{ vars.APP_VERSION}}"
          
      - name: Show Github Variables Node
        run: |
          echo "Node Version: ${{ vars.NODE_VERSION}}"
          
      - name: Deploy API
        run: |
          echo "Deploying with key ${{ secrets.API_KEY }}"
          
      # Variables a nivel del step
      - name: Build 
        run: npm run build
        env:
          APP_VERSION: '2.0.0'